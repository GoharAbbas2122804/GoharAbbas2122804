<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gohar Abbas | 3D Interactive Space</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        background: #020617;
        overflow: hidden;
        color: #f8fafc;
        font-family: "Outfit", sans-serif;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        cursor: move;
      }
      .ui-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: none;
        z-index: 10;
      }
      h1 {
        font-size: 5rem;
        margin: 0;
        font-weight: 700;
        background: linear-gradient(135deg, #36bcf7, #a855f7, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -2px;
        filter: drop-shadow(0 0 10px rgba(54, 188, 247, 0.3));
      }
      p {
        font-size: 1.4rem;
        opacity: 0.7;
        font-weight: 300;
        margin-top: 10px;
        text-transform: uppercase;
        letter-spacing: 4px;
      }
      .footer {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.9rem;
        opacity: 0.5;
        z-index: 10;
      }
      .badge {
        display: inline-block;
        padding: 4px 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(5px);
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
      <h1>Gohar Abbas</h1>
      <p>Full Stack & 3D Developer</p>
      <div class="badge">Experimental 3D Experience</div>
    </div>
    <div class="footer">Drag to interact • Scroll to zoom</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document
        .getElementById("canvas-container")
        .appendChild(renderer.domElement);

      // Starfield Particles
      const particlesGeometry = new THREE.BufferGeometry();
      const count = 3000;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);

      for (let i = 0; i < count * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 15;
        colors[i] = Math.random();
      }

      particlesGeometry.setAttribute(
        "position",
        new THREE.BufferAttribute(positions, 3),
      );
      particlesGeometry.setAttribute(
        "color",
        new THREE.BufferAttribute(colors, 3),
      );

      const particlesMaterial = new THREE.PointsMaterial({
        size: 0.03,
        vertexColors: true,
        transparent: true,
        opacity: 0.6,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      const particles = new THREE.Points(particlesGeometry, particlesMaterial);
      scene.add(particles);

      // Central Core Object (Holographic Blob)
      const coreGeometry = new THREE.IcosahedronGeometry(1.5, 20);
      const coreMaterial = new THREE.MeshPhongMaterial({
        color: 0x36bcf7,
        wireframe: true,
        transparent: true,
        opacity: 0.2,
        shininess: 100,
      });
      const core = new THREE.Mesh(coreGeometry, coreMaterial);
      scene.add(core);

      // Inner Solid Pulsing Core
      const innerGeometry = new THREE.TorusKnotGeometry(0.6, 0.2, 100, 16);
      const innerMaterial = new THREE.MeshStandardMaterial({
        color: 0xa855f7,
        metalness: 0.8,
        roughness: 0.2,
        emissive: 0x36bcf7,
        emissiveIntensity: 0.5,
      });
      const innerCore = new THREE.Mesh(innerGeometry, innerMaterial);
      scene.add(innerCore);

      // Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const pointLight1 = new THREE.PointLight(0x36bcf7, 30);
      pointLight1.position.set(2, 3, 4);
      scene.add(pointLight1);

      const pointLight2 = new THREE.PointLight(0xec4899, 30);
      pointLight2.position.set(-2, -3, -4);
      scene.add(pointLight2);

      camera.position.z = 6;

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.5;

      // Animation Loop
      let clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const elapsedTime = clock.getElapsedTime();

        core.rotation.y = elapsedTime * 0.1;
        core.rotation.z = elapsedTime * 0.05;

        innerCore.rotation.x = elapsedTime * 0.5;
        innerCore.rotation.y = elapsedTime * 0.3;

        // Pulsing effect
        const s = 1 + Math.sin(elapsedTime * 2) * 0.1;
        innerCore.scale.set(s, s, s);

        particles.rotation.y = elapsedTime * 0.02;

        controls.update();
        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    </script>
  </body>
</html>
